<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoadGuard AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    min-height:100vh;
    background:#0B1020;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
}

.bg{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%,rgba(79,140,255,.25),transparent 30%),
    radial-gradient(circle at 80% 80%,rgba(34,197,94,.15),transparent 30%);
}

.container{
    position:relative;
    z-index:10;
    max-width:800px;
    padding:40px;
}

.logo{
    font-size:4rem;
    margin-bottom:20px;
}

h1{
    font-size:4rem;
    margin-bottom:15px;
}

.subtitle{
    font-size:1.3rem;
    color:#a0a8c0;
    margin-bottom:40px;
}

.download-btn{
    display:inline-block;
    text-decoration:none;
    background:#4F8CFF;
    color:white;
    font-size:1.3rem;
    font-weight:700;
    padding:20px 40px;
    border-radius:18px;
    transition:.3s;
    box-shadow:0 0 30px rgba(79,140,255,.4);
}

.download-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 0 50px rgba(79,140,255,.7);
}

.footer{
    margin-top:30px;
    color:#7d8597;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="logo">🚧</div>

<h1>RoadGuard AI</h1>

<p class="subtitle">
AI-Powered Road Infrastructure Monitoring Platform
</p>

<a
class="download-btn"
href="https://sam3360.github.io/roadguard-ai/index.html"
>
Download PWA
</a>

<div class="footer">
Monitor • Detect • Alert
</div>

</div>

</body>
</html>
